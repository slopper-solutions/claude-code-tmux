# Harness map — registered LLM-CLI harnesses that the agent-* scripts can drive.
# Sourced by bin/agent-spawn, bin/agent-talk, bin/agent-peek, bin/agent-list,
# bin/agent-kill. Strict KEY=VALUE — no shell expansion, no `export`.
#
# Per-harness key naming: HARNESS_<NAME>_<FIELD>
#   _BINARY          binary name on PATH (or absolute path)
#   _RC_FLAG         flag to enable Remote Control / mobile-app reach (empty if unsupported)
#   _RC_TAKES_NAME   1 if the RC flag takes a session-name argument, 0 otherwise
#   _YOLO_FLAG       flag to skip permission prompts (empty if unsupported)
#   _SANDBOX_OK      1 if the harness runs cleanly under bwrap, 0 otherwise
#   _STATUS          "stable" — adapter wired and tested
#                    "stub"   — registered for dispatch but adapter not yet
#                              implemented; agent-* scripts will refuse to
#                              operate until the paste/idle behavior is verified
#
# To wire a stub: confirm the harness's TUI input behavior (paste-vs-Enter,
# idle pattern), implement bin/harness-<name>.sh with the right send-keys
# pattern, then flip _STATUS to stable.

# --- Claude Code (Anthropic) ---
HARNESS_CLAUDE_BINARY=claude
HARNESS_CLAUDE_RC_FLAG=--rc
HARNESS_CLAUDE_RC_TAKES_NAME=1
HARNESS_CLAUDE_YOLO_FLAG=--dangerously-skip-permissions
HARNESS_CLAUDE_SANDBOX_OK=1
HARNESS_CLAUDE_STATUS=stable

# --- Codex CLI (OpenAI) ---
HARNESS_CODEX_BINARY=codex
HARNESS_CODEX_RC_FLAG=
HARNESS_CODEX_RC_TAKES_NAME=0
HARNESS_CODEX_YOLO_FLAG=
HARNESS_CODEX_SANDBOX_OK=0
HARNESS_CODEX_STATUS=stub

# --- Gemini CLI (Google) ---
HARNESS_GEMINI_BINARY=gemini
HARNESS_GEMINI_RC_FLAG=
HARNESS_GEMINI_RC_TAKES_NAME=0
HARNESS_GEMINI_YOLO_FLAG=
HARNESS_GEMINI_SANDBOX_OK=0
HARNESS_GEMINI_STATUS=stub

# --- OpenCode (open-source) ---
HARNESS_OPENCODE_BINARY=opencode
HARNESS_OPENCODE_RC_FLAG=
HARNESS_OPENCODE_RC_TAKES_NAME=0
HARNESS_OPENCODE_YOLO_FLAG=
HARNESS_OPENCODE_SANDBOX_OK=0
HARNESS_OPENCODE_STATUS=stub

# Space-separated list of registered harness names (lowercase). agent-list
# uses this to recognize windows; agent-spawn iterates it for default lookups.
HARNESSES_REGISTERED="claude codex gemini opencode"

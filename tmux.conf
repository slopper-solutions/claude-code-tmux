# Tmux settings recommended by Claude Code's terminal-config docs:
# https://code.claude.com/docs/en/terminal-config#configure-tmux
# - allow-passthrough: desktop notifications / progress bar updates reach the
#   outer terminal instead of being swallowed by tmux.
# - extended-keys + terminal-features: tmux distinguishes Shift+Enter from
#   plain Enter, so multiline input works in the Claude Code TUI.
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
